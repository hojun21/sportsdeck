<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background -->
  <rect width="40" height="40" rx="10" fill="#0d1a14"/>
  <!-- Outer green border -->
  <rect x="0.75" y="0.75" width="38.5" height="38.5" rx="9.25" stroke="#00e5a0" stroke-width="1.5" fill="none" opacity="0.38"/>
  <!-- Pitch outer bounds -->
  <rect x="5" y="5" width="30" height="30" rx="2" stroke="#00e5a0" stroke-width="1" fill="none" opacity="0.28"/>
  <!-- Halfway line -->
  <line x1="5" y1="20" x2="35" y2="20" stroke="#00e5a0" stroke-width="1" opacity="0.28"/>
  <!-- Centre circle -->
  <circle cx="20" cy="20" r="6.5" stroke="#00e5a0" stroke-width="1.2" fill="none" opacity="0.72"/>
  <!-- Centre dot -->
  <circle cx="20" cy="20" r="2" fill="#00e5a0"/>
  <!-- Top penalty arc -->
  <path d="M12 5 Q12 12 20 12 Q28 12 28 5" stroke="#00e5a0" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Bottom penalty arc -->
  <path d="M12 35 Q12 28 20 28 Q28 28 28 35" stroke="#00e5a0" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
