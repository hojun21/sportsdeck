version: "3.8"

services:
  db:
    image: postgres:15
    container_name: sportsdeck-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sportsdeck
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: 
      context: ./sportsdeck  
      dockerfile: Dockerfile
    container_name: sportsdeck-app
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/sportsdeck
    command: sh -c "npx prisma migrate deploy && npm start"

volumes:
  postgres_data: